services:
  app:
    build: .
    ports:
      - "80:3000"
      - "3000:3000"
    environment:
      - NODE_ENV=production
    env_file:
      - .env
    depends_on:
      - db
    restart: always

  db:
    image: mysql:8.0
    restart: always
    environment:
      - MYSQL_DATABASE=alaba_cluster
      - MYSQL_USER=alaba_user
      - MYSQL_PASSWORD=alaba_secret_pass
      - MYSQL_ROOT_PASSWORD=alaba_root_secret
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin" ,"ping", "-h", "localhost"]
      timeout: 20s
      retries: 10

volumes:
  mysql_data:
