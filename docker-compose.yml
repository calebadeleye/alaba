version: "3.8"

services:
  traefik:
    image: traefik:v3.0
    restart: always

    command:
      - "--api.dashboard=true"
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--providers.docker.network=alaba_default"

      - "--entrypoints.web.address=:80"
      - "--entrypoints.websecure.address=:443"

      # redirect HTTP → HTTPS
      - "--entrypoints.web.http.redirections.entrypoint.to=websecure"
      - "--entrypoints.web.http.redirections.entrypoint.scheme=https"

      - "--certificatesresolvers.le.acme.tlschallenge=true"
      - "--certificatesresolvers.le.acme.email=admin@naitalk.com"
      - "--certificatesresolvers.le.acme.storage=/letsencrypt/acme.json"

    ports:
      - "80:80"
      - "443:443"

    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./letsencrypt:/letsencrypt

    networks:
      - alaba_default

  app:
    build: .
    restart: always

    environment:
      - NODE_ENV=production
      - PORT=3000

    env_file:
      - .env

    depends_on:
      - db

    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=alaba_default"

      - "traefik.http.routers.alaba.rule=Host(`host.naitalk.com`)"
      - "traefik.http.routers.alaba.entrypoints=websecure"
      - "traefik.http.routers.alaba.tls.certresolver=le"

      - "traefik.http.services.alaba.loadbalancer.server.port=3000"

    networks:
      - alaba_default

  db:
    image: mysql:8.0
    restart: always

    environment:
      MYSQL_DATABASE: alaba_cluster
      MYSQL_USER: alaba_user
      MYSQL_PASSWORD: alaba_secret_pass
      MYSQL_ROOT_PASSWORD: alaba_root_secret

    volumes:
      - mysql_data:/var/lib/mysql

    networks:
      - alaba_default

volumes:
  mysql_data:

networks:
  alaba_default:
    driver: bridge